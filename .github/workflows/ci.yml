name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # requires-python = ">=3.12" (the code uses PEP 695 generics)
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with test extras
        run: pip install -e ".[test]"

      - name: Run test suite
        run: pytest

      - name: Run examples (smoke test)
        run: |
          for ex in examples/*.py; do
            echo "--- $ex ---"
            python "$ex" > /dev/null
          done

  lint:
    name: lint (pyflakes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyflakes
        run: pip install pyflakes

      - name: Run pyflakes
        run: python -m pyflakes src/dsl
